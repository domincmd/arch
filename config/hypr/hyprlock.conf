# BACKGROUND
background {
    monitor =
    path = ~/wallpapers/japan.jpeg
    blur_passes = 3
    contrast = 0.9
    brightness = 0.7
    vibrancy = 0.2
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# TIME
label {
    monitor =
    text = $TIME
    color = rgba(255, 135, 95, .75)
    font_size = 120
    font_family = JetBrainsMono Bold
    position = 0, 240
    halign = center
    valign = center
}

