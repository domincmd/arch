# USER
label {
    monitor =
    text = hi, <span foreground="##FF875F">$USER</span>
    color = rgba(255, 255, 255, .65)
    font_size = 35
    font_family = JetBrainsMono
    position = 0, -10
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 290, 60
	text_trim = false
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(27, 18, 12, 0.30)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = JetBrainsMono
    placeholder_text = <i><span foreground="##ffffff99">password</span></i>
    hide_input = false
    position = 0, -90
    halign = center
    valign = center
}

